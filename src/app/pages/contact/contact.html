<section class="contact">
  <div class="contact-header">
    <h1>Contactez-nous</h1>

    <p>Une question, une réservation ou besoin d'un conseil ? Notre équipe est à votre écoute.</p>
  </div>

  <div class="contact-container">
    <!-- INFOS -->

    <div class="contact-card">
      <h2>SB NATURALLY</h2>

      <p>Votre beauté naturelle, notre passion.</p>

      <div class="info">
        <mat-icon>location_on</mat-icon>
        <span> Paris, France </span>
      </div>

      <div class="info">
        <mat-icon>phone</mat-icon>

        <span> 07 59 23 69 88 </span>
      </div>

      <div class="info">
        <mat-icon>schedule</mat-icon>
        <span> Sur rendez-vous </span>
      </div>
      <a class="whatsapp" href="https://wa.me/+33759236988" target="_blank">
        <mat-icon>chat</mat-icon>
        Réserver sur WhatsApp</a
      >
    </div>

    <!-- FORM -->

    <form class="contact-form">
      <h2>Envoyez un message</h2>
      <input type="text" placeholder="Votre nom" />

      <input type="email" placeholder="Votre email" />

      <input type="tel" placeholder="Votre téléphone" />

      <textarea placeholder="Votre message"> </textarea>

      <button>Envoyer</button>
    </form>
  </div>
</section>
